services:
  - type: web
    name: content-pilot-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: content-pilot-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # set this to your Vercel frontend URL after deploying frontend
      - key: OPENAI_API_KEY
        sync: false   # set from Render dashboard — never commit

databases:
  - name: content-pilot-db
    plan: free
    databaseName: content_pilot
